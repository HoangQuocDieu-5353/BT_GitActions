name: Deploy Spring Boot to Docker Hub

on:
  push:
    branches: [ "main" ] # Chạy mỗi khi bạn push code lên nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Login to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7.0.0
        with:
          context: ./HoangQuocDieu
          push: true
          tags: |
            hoangdieu17012004/spring-boot-app:latest
            hoangdieu17012004/spring-boot-app:${{ github.run_number }}
