name: CI/CD Spring Boot to DevOps Classroom

on:
  push:
    branches: [ "main" ] # Tự động chạy khi bạn push code lên nhánh main
  workflow_dispatch:      # Cho phép bạn bấm nút chạy thủ công từ tab Actions

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Login to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7.0.0
        with:
          # Đảm bảo context trỏ đúng vào thư mục chứa Dockerfile của bạn
          context: ./HoangQuocDieu
          push: true
          tags: |
            hoangdieu17012004/spring-boot-app:latest
            hoangdieu17012004/spring-boot-app:${{ github.run_number }}

      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="hoangdieu17012004/spring-boot-app"
          # Gửi tín hiệu Webhook để Server tải Image mới nhất về
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest")
          
          # Tách lấy nội dung Body và Mã trạng thái HTTP
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)
          
          echo "Webhook HTTP: $CODE"
          
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          
          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
